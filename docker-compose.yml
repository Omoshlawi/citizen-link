services:
  db:
    container_name: citizen_link_db
    image: pgvector/pgvector:0.8.1-pg18-trixie
    restart: unless-stopped
    ports:
      - '5432:5432'
    env_file:
      - .env
    volumes:
      - db_data:/pgvector/pgvector
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
  minio:
    container_name: citizen_link_minio
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001" # Minio needs a command to start
    ports:
      - '9000:9000' # API
      - '9001:9001' # Console UI
    env_file:
      - .env
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}

  app:
    container_name: citizen_link_app
    build: .
    restart: unless-stopped
    depends_on:
      - db
      - minio
    ports:
      - '2000:2000'
    env_file:
      - .env
    environment:
      # App Config
      - NODE_ENV=${NODE_ENV}
      # Database Config
      - DATABASE_URL=${DATABASE_URL}
      - PORT=${PORT}
      # Better Auth Config
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      # Admin user and seed config
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SKIP_ADMIN_IF_EXISTS=${SKIP_ADMIN_IF_EXISTS}
      # S3 Config
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRETE_ACCESS_KEY_ID=${S3_SECRETE_ACCESS_KEY_ID}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET_TMP=${S3_BUCKET_TMP}
      - S3_BUCKET_CASES=${S3_BUCKET_CASES}
      # Embedding Config
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL}
      # OpenAI Config
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      # Vision AI Config
      - VISION_AI_BASE_URL=${VISION_AI_BASE_URL}
      - VISION_AI_MODEL=${VISION_AI_MODEL}
      - VISION_AI_API_KEY=${VISION_AI_API_KEY}
      # Text Extraction AI Config
      - TEXT_EXTRACTION_AI_BASE_URL=${TEXT_EXTRACTION_AI_BASE_URL}
      - TEXT_EXTRACTION_AI_MODEL=${TEXT_EXTRACTION_AI_MODEL}
      - TEXT_EXTRACTION_AI_API_KEY=${TEXT_EXTRACTION_AI_API_KEY}

volumes:
  db_data:
    driver: local
  minio_data:
    driver: local
